<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Schedule</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Management System</h2>
        </div>
        <ul class="sidebar-nav">
            <li><a href="index.html"><span class="icon">&#128218;</span> Students</a></li>
            <li><a href="faculty.html"><span class="icon">&#128100;</span> Faculty</a></li>
            <li><a href="course.html"><span class="icon">&#128214;</span> Courses</a></li>
            <li><a href="department.html"><span class="icon">&#127984;</span> Departments</a></li>
            <li><a href="schedule.html" class="active"><span class="icon">&#128197;</span> Schedules</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="container">
            <h1>Course Schedules</h1>

            <div class="form-container">
                <h2 id="form-title">Assign Day to Course</h2>
                <form id="schedule-form">
                    <div class="form-group">
                        <label for="course-select">Select Course</label>
                        <select id="course-select" required>
                            <option value="">Loading courses...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="day-select">Select Day</label>
                        <select id="day-select" required>
                            <option value="Monday">Monday</option>
                            <option value="Tuesday">Tuesday</option>
                            <option value="Wednesday">Wednesday</option>
                            <option value="Thursday">Thursday</option>
                            <option value="Friday">Friday</option>
                            <option value="Saturday">Saturday</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="submit" id="submit-btn">Assign Day</button>
                    </div>
                </form>
            </div>

            <div class="table-container">
                <h2>Schedule List</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Course</th>
                            <th>Assigned Day</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="schedule-tbody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="schedule.js"></script>
</body>
</html>
